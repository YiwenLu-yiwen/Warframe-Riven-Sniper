<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Warframe 裂罅狙击 v1.2</title>
  <style>
    :root {
      --bg: #12100c;
      --panel: #1d1a14;
      --panel-2: #252117;
      --line: #423a2b;
      --text: #f4ead6;
      --muted: #b1a48a;
      --faint: #746954;
      --accent: #d6a84c;
      --blue: #78b7bd;
      --green: #8fbd69;
      --red: #d26b56;
      --hit-grid: minmax(450px, 1fr) 108px minmax(168px, .32fr) 92px 92px;
      font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
      font-variant-numeric: tabular-nums;
    }

    html[lang="zh-Hans"] {
      font-family: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
    }

    button, input, select {
      font: inherit;
      color: inherit;
    }

    button { cursor: pointer; }

    input, select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      background: #0e0c09;
      border-radius: 4px;
      padding: 9px 10px;
    }

    input[type="search"] {
      appearance: none;
    }

    .generated-name {
      min-height: 54px;
      border: 1px solid var(--line);
      background: #0e0c09;
      border-radius: 4px;
      padding: 10px 12px;
      display: grid;
      align-content: center;
      gap: 2px;
      color: var(--text);
      min-width: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
      word-break: break-word;
      white-space: normal;
    }

    .generated-name span {
      min-width: 0;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .generated-weapon {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .generated-core {
      color: var(--text);
      font-weight: 800;
      line-height: 1.35;
    }

    .name-preview-field {
      padding-top: 2px;
    }

    h1, h2, h3, p { margin: 0; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
    }

    .topbar {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #15120e;
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #0e0c09;
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-title {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    h1 {
      font-size: 18px;
      letter-spacing: .01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .version-pill {
      flex: 0 0 auto;
      border: 1px solid rgba(214, 168, 76, .55);
      border-radius: 999px;
      padding: 2px 7px 3px;
      color: #0e0c09;
      background: var(--accent);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .smart-search {
      display: grid;
      gap: 4px;
    }

    .smart-search input {
      padding-left: 34px;
      background:
        radial-gradient(circle at 15px 19px, transparent 0 4px, var(--faint) 4px 5px, transparent 5px),
        linear-gradient(45deg, transparent 0 52%, var(--faint) 52% 59%, transparent 59%) 22px 24px / 10px 10px no-repeat,
        #0e0c09;
    }

    .search-help {
      min-height: 14px;
      color: var(--faint);
      font-size: 12px;
      padding-left: 2px;
    }

    .price-entry {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      border: 1px solid var(--line);
      background: #0e0c09;
      border-radius: 4px;
      overflow: hidden;
    }

    .price-entry:focus-within {
      border-color: var(--accent);
    }

    .price-entry input {
      min-height: 38px;
      border: 0;
      background: transparent;
      border-radius: 0;
    }

    .price-entry span {
      min-width: 32px;
      padding: 0 10px;
      color: var(--accent);
      font-weight: 700;
      border-left: 1px solid var(--line);
    }

    .seg {
      display: inline-grid;
      grid-auto-flow: column;
      border: 1px solid var(--line);
      background: #0e0c09;
    }

    .seg button {
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--muted);
      min-height: 40px;
      padding: 9px 12px;
    }

    .seg button:last-child { border-right: 0; }

    .seg button[aria-pressed="true"] {
      background: var(--accent);
      color: #171208;
    }

    .primary,
    .ghost,
    .danger {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 4px;
      min-height: 40px;
      padding: 9px 12px;
    }

    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #171208;
    }

    .danger {
      border-color: rgba(210,107,86,.75);
      color: #ffd8cf;
      background: rgba(210,107,86,.12);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .45;
    }

    .metrics-bar {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--line);
      background: #17140f;
    }

    .notice-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 9px 18px;
      border-bottom: 1px solid var(--line);
      background: #14110d;
    }

    .notice-summary {
      min-width: 0;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #0e0c09;
      color: inherit;
      padding: 8px 11px;
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      text-align: left;
    }

    .notice-summary:hover {
      border-color: var(--accent);
    }

    .notice-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--faint);
    }

    .notice-summary.has-success .notice-dot { background: var(--green); }
    .notice-summary.has-price .notice-dot { background: var(--accent); }
    .notice-summary.has-wait .notice-dot { background: var(--blue); }

    .notice-copy {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    .notice-copy strong,
    .notice-copy span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .notice-copy strong {
      font-size: 13px;
    }

    .notice-copy span,
    .notice-count {
      color: var(--muted);
      font-size: 12px;
    }

    .notice-permission {
      white-space: nowrap;
    }

    .notice-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .notice-actions button[aria-pressed="true"] {
      border-color: rgba(214, 168, 76, .55);
      color: var(--accent);
      background: rgba(214, 168, 76, .1);
    }

    .metric {
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 11px 12px;
      min-height: 68px;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .07em;
    }

    html[lang="zh-Hans"] .metric span {
      letter-spacing: .04em;
    }

    .metric strong {
      display: block;
      margin-top: 8px;
      font-size: 24px;
    }

    .metric-button {
      text-align: left;
      color: inherit;
      cursor: pointer;
    }

    .metric-button:hover {
      border-color: var(--accent);
    }

    .metric-button:focus-visible,
    .copy-button:focus-visible,
    .weapon-route:focus-visible,
    .notice-summary:focus-visible,
    .refresh-control:focus-within {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 0;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: var(--panel);
      min-width: 0;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      color: var(--accent);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .section-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .refresh-control {
      min-height: 30px;
      border: 1px solid var(--line);
      background: #0e0c09;
      color: var(--muted);
      display: inline-grid;
      grid-template-columns: auto 54px auto;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      font-size: 12px;
      line-height: 1;
    }

    .refresh-control input {
      min-height: 22px;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      padding: 0;
      text-align: right;
      font-weight: 800;
    }

    .refresh-control span:last-child {
      color: var(--accent);
      font-weight: 800;
    }

    .refresh-risk {
      border: 1px solid rgba(210,107,86,.52);
      background: rgba(210,107,86,.1);
      color: #ffd8cf;
      padding: 5px 8px;
      font-size: 12px;
      line-height: 1;
      white-space: nowrap;
    }

    .refresh-risk[hidden] {
      display: none;
    }

    .sort-header {
      display: inline-grid;
      grid-template-columns: auto 12px;
      align-items: center;
      gap: 4px;
      width: auto;
      min-height: 28px;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      text-align: left;
      cursor: pointer;
    }

    .sort-header:hover {
      color: var(--accent);
    }

    .sort-glyph {
      display: inline-grid;
      place-items: center;
      width: 12px;
      height: 14px;
      color: var(--faint);
      font-size: 12px;
      line-height: 1;
    }

    .sort-header[aria-pressed="true"] .sort-glyph {
      color: var(--accent);
    }

    html[lang="zh-Hans"] .section-head {
      letter-spacing: .04em;
    }

    .count {
      color: var(--muted);
      text-transform: none;
      letter-spacing: 0;
    }

    .count.market-waiting {
      color: var(--accent);
    }

    .count.market-error {
      color: var(--red);
    }

    .riven-list {
      padding: 10px;
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 240px);
      overflow: auto;
    }

    .weapon-group {
      border: 1px solid var(--line);
      background: #18150f;
    }

    .weapon-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 38px;
      padding: 9px 10px;
      border-bottom: 1px solid var(--line);
    }

    .weapon-group-head strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .weapon-group-head span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .weapon-rivens {
      display: grid;
      gap: 6px;
      padding: 7px;
    }

    .riven-item {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #211e17;
      color: var(--text);
      text-align: left;
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .riven-item[aria-pressed="true"] {
      border-color: var(--accent);
      box-shadow: inset 4px 0 0 var(--accent);
      background: #302819;
    }

    .riven-item strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .riven-item small {
      color: var(--muted);
      line-height: 1.35;
    }

    .riven-meta {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--faint);
      font-size: 12px;
    }

    .modal-analysis {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #15120e;
      padding: 10px;
      display: grid;
      gap: 9px;
      min-width: 0;
    }

    .analysis-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;
    }

    .analysis-head strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .grade-pill {
      min-width: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      text-align: center;
      font-weight: 800;
      line-height: 1.1;
    }

    .grade-a,
    .tier-a { color: var(--green); border-color: rgba(143,189,105,.5); }
    .grade-b,
    .tier-b { color: var(--blue); border-color: rgba(120,183,189,.48); }
    .grade-c,
    .tier-c { color: var(--accent); border-color: rgba(214,168,76,.5); }
    .grade-d,
    .tier-d { color: var(--red); border-color: rgba(210,107,86,.52); }

    .analysis-meta,
    .analysis-reco {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .analysis-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      min-width: 0;
    }

    .analysis-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      line-height: 1.35;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .side-actions {
      padding: 12px;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .main {
      min-width: 0;
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .card {
      border: 1px solid var(--line);
      background: var(--panel);
      min-width: 0;
    }

    .editor {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
      padding: 14px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .span-2 { grid-column: span 2; }
    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-5 { grid-column: span 5; }
    .span-6 { grid-column: span 6; }
    .span-12 { grid-column: span 12; }

    label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .negative-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 8px;
    }

    .combo {
      position: relative;
      min-width: 0;
    }

    .combo input {
      padding-right: 38px;
    }

    .combo::after {
      content: "";
      position: absolute;
      right: 13px;
      top: 17px;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-top: 6px solid var(--muted);
      pointer-events: none;
    }

    .combo-menu {
      position: absolute;
      inset-inline: 0;
      top: calc(100% + 4px);
      z-index: 30;
      max-height: 240px;
      overflow: auto;
      border: 1px solid var(--line);
      background: #11100c;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }

    .combo-menu[hidden] {
      display: none;
    }

    .combo-option {
      width: 100%;
      border: 0;
      border-bottom: 1px solid rgba(66,58,43,.7);
      background: transparent;
      color: var(--text);
      text-align: left;
      min-height: 38px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .combo-option:last-child { border-bottom: 0; }

    .combo-option:hover,
    .combo-option[aria-selected="true"] {
      background: #302819;
      color: var(--accent);
    }

    .combo-option small {
      color: var(--faint);
      white-space: nowrap;
    }

    .detail-section {
      grid-column: span 12;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .market-details {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .polarity-option {
      font-family: inherit;
    }

    .editor-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      align-content: end;
    }

    .hint {
      border-top: 1px solid var(--line);
      padding: 11px 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .inbox {
      overflow: auto;
    }

    .table {
      min-width: 980px;
    }

    .row {
      display: grid;
      grid-template-columns: var(--hit-grid);
      border-top: 1px solid var(--line);
      align-items: center;
    }

    .row:first-child { border-top: 0; }

    .row.head {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .045em;
      font-size: 12px;
      background: #15120e;
    }

    .cell {
      padding: 11px 12px;
      border-right: 1px solid var(--line);
      min-height: 54px;
      display: grid;
      align-content: center;
    }

    .cell:last-child { border-right: 0; }

    .cell small {
      color: var(--muted);
      margin-top: 4px;
    }

    .listing-title {
      display: flex;
      gap: 8px;
      align-items: baseline;
      min-width: 0;
    }

    .listing-title strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .listing-title small {
      margin-top: 0;
      flex: 0 0 auto;
    }

    .listing-grade-stack {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .listing-grade {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 1px 6px;
      font-size: 11px;
      line-height: 1.35;
      font-weight: 800;
    }

    .stat-chips {
      display: flex;
      flex-wrap: nowrap;
      gap: 5px;
      margin-top: 7px;
      min-width: 0;
      overflow: hidden;
    }

    .stat-chip {
      border: 1px solid rgba(143,189,105,.36);
      background: rgba(143,189,105,.08);
      color: var(--green);
      border-radius: 999px;
      padding: 2px 7px;
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stat-chip.negative {
      border-color: rgba(210,107,86,.4);
      background: rgba(210,107,86,.09);
      color: var(--red);
    }

    .online { color: var(--green); }
    .offline { color: var(--faint); text-decoration: line-through; }

    .seller-name {
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .price-cell,
    .time-cell {
      white-space: nowrap;
    }

    .seller-cell {
      gap: 4px;
      align-items: start;
    }

    .status-pill {
      width: max-content;
      border: 1px solid rgba(143,189,105,.45);
      border-radius: 999px;
      color: var(--green);
      padding: 2px 7px;
      font-size: 12px;
      line-height: 1.2;
      text-decoration: none;
    }

    .status-pill.offline {
      border-color: rgba(116,105,84,.55);
      color: var(--faint);
      text-decoration: none;
    }

    .copy-button {
      border: 1px solid var(--line);
      background: #0e0c09;
      border-radius: 4px;
      min-height: 32px;
      padding: 6px 8px;
      color: var(--text);
      font-size: 12px;
      width: 100%;
    }

    .copy-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .empty {
      padding: 30px;
      color: var(--muted);
      text-align: center;
      border-top: 1px solid var(--line);
    }

    .app-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 42px;
      padding: 10px 18px;
      border-top: 1px solid var(--line);
      color: var(--faint);
      font-size: 12px;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(7,6,4,.72);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .modal[hidden] {
      display: none;
    }

    .modal-panel {
      width: min(860px, 100%);
      max-height: min(780px, calc(100vh - 48px));
      overflow: hidden;
      border: 1px solid var(--line);
      background: #1a1711;
      box-shadow: 0 20px 70px rgba(0,0,0,.45);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .modal-panel.wide-panel {
      width: min(1240px, calc(100vw - 48px));
    }

    .modal-panel.confirm-panel {
      width: min(460px, calc(100vw - 48px));
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      min-width: 0;
    }

    .modal-head > div {
      min-width: 0;
    }

    .modal-tools {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .modal-tools select {
      min-height: 36px;
      width: auto;
      min-width: 150px;
      padding: 7px 9px;
    }

    .modal-head h2 {
      font-size: 18px;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .modal-head .sub {
      margin-top: 4px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .modal-body {
      padding: 14px;
      display: grid;
      gap: 12px;
      min-height: 0;
      overflow: auto;
      scroll-padding-bottom: 18px;
    }

    .confirm-body {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .confirm-body p {
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .confirm-target {
      border: 1px solid rgba(210,107,86,.45);
      background: rgba(210,107,86,.08);
      padding: 11px 12px;
      display: grid;
      gap: 5px;
    }

    .confirm-target strong,
    .confirm-target span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .confirm-target span {
      color: var(--muted);
      font-size: 12px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 12px;
      min-width: 0;
    }

    .modal-grid > * {
      min-width: 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      border-top: 1px solid var(--line);
      background: #1a1711;
      padding: 14px;
      min-height: 69px;
      flex-wrap: wrap;
    }

    .hit-stack {
      display: grid;
      gap: 8px;
    }

    .notice-list {
      display: grid;
      gap: 8px;
    }

    .notice-item {
      border: 1px solid var(--line);
      background: #15120e;
      padding: 11px 12px;
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .notice-item .notice-dot {
      margin-top: 5px;
    }

    .notice-item.price .notice-dot { background: var(--accent); }
    .notice-item.success .notice-dot { background: var(--green); }
    .notice-item.wait .notice-dot { background: var(--blue); }

    .notice-item[data-can-locate="true"] {
      cursor: pointer;
    }

    .notice-item strong,
    .notice-item span {
      min-width: 0;
    }

    .notice-item small {
      color: var(--muted);
      white-space: nowrap;
    }

    .notice-item-main {
      display: grid;
      gap: 3px;
    }

    .notice-item-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      min-width: 116px;
    }

    .notice-delete {
      width: 28px;
      min-height: 28px;
      padding: 0;
      border-radius: 50%;
      font-size: 16px;
      line-height: 1;
    }

    .hit-focus {
      outline: 2px solid rgba(214,168,76,.8);
      outline-offset: 3px;
      transition: outline-color .2s ease;
    }

    .toast-stack {
      position: fixed;
      right: 18px;
      top: 112px;
      z-index: 60;
      width: min(380px, calc(100vw - 36px));
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      border: 1px solid var(--line);
      background: #15120e;
      box-shadow: 0 18px 50px rgba(0,0,0,.38);
      padding: 10px 11px;
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .toast.price { border-color: rgba(214,168,76,.55); }
    .toast.success { border-color: rgba(143,189,105,.45); }
    .toast.wait { border-color: rgba(120,183,189,.48); }

    .toast .notice-dot {
      margin-top: 5px;
    }

    .toast.price .notice-dot { background: var(--accent); }
    .toast.success .notice-dot { background: var(--green); }
    .toast.wait .notice-dot { background: var(--blue); }

    .toast strong,
    .toast span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toast span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .hit-stack.table-like {
      gap: 0;
      min-width: 980px;
      border: 1px solid var(--line);
      background: #15120e;
    }

    .hit-line {
      border: 1px solid var(--line);
      background: #15120e;
      padding: 10px;
      display: grid;
      grid-template-columns: var(--hit-grid);
      gap: 10px;
      align-items: center;
    }

    .hit-stack.table-like .hit-line {
      border: 0;
      border-top: 1px solid var(--line);
      background: transparent;
    }

    .hit-stack.table-like .hit-line:first-child {
      border-top: 0;
    }

    .hit-line.head {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .045em;
      font-size: 12px;
      min-height: 42px;
      padding-block: 8px;
    }

    .hit-line strong,
    .hit-line span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .weapon-route {
      width: 100%;
      border: 1px solid var(--line);
      background: #15120e;
      color: inherit;
      padding: 11px 12px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
      text-align: left;
    }

    .weapon-route strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .weapon-route span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .weapon-route:hover {
      border-color: var(--accent);
    }

    @media (max-width: 1050px) {
      .topbar,
      .layout,
      .search-row {
        grid-template-columns: 1fr;
      }

      .sidebar { border-right: 0; border-bottom: 1px solid var(--line); }
      .metrics-bar { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .notice-bar { grid-template-columns: 1fr; }
      .notice-actions { justify-content: stretch; }
      .notice-actions button { flex: 1 1 150px; }
      .span-2, .span-3, .span-4, .span-5, .span-6, .span-12 { grid-column: span 12; }
      .editor, .modal-grid { grid-template-columns: repeat(12, minmax(0, 1fr)); }
      .market-details, .stat-grid { grid-template-columns: 1fr; }
      .hit-line { grid-template-columns: 1fr; }
      .notice-item { grid-template-columns: 10px minmax(0, 1fr); }
      .notice-item-actions { grid-column: 2; justify-content: flex-start; }
    }

    @media (max-width: 620px) {
      .modal {
        padding: 10px;
      }

      .modal-panel {
        max-height: calc(100vh - 20px);
      }

      .modal-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .generated-name {
        font-size: 14px;
      }

      .modal-actions button {
        flex: 1 1 140px;
      }

      .metrics-bar,
      .side-actions,
      .editor-actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="/assets/logo.svg" alt="" aria-hidden="true">
        <div class="brand-copy">
          <div class="brand-title">
            <h1 data-i18n="title">裂罅狙击</h1>
            <span class="version-pill">v1.2</span>
          </div>
        </div>
      </div>
      <div class="search-row">
        <div class="smart-search">
          <input id="search" type="search" aria-label="智能搜索" placeholder="搜索武器、词条、卖家、价格、时间">
          <span class="search-help" id="searchHelp" data-i18n="searchHelp">试试：暴击伤害、卖家名、&lt;450p、&gt;100p、在线</span>
        </div>
        <div class="seg" aria-label="Seller scope">
          <button id="onlineOnly" aria-pressed="true" data-i18n="onlineOnly">只看在线</button>
          <button id="includeOffline" aria-pressed="false" data-i18n="includeOffline">包含离线</button>
        </div>
        <div class="seg" aria-label="Language">
          <button data-lang="en" aria-pressed="false">EN</button>
          <button data-lang="zh" aria-pressed="true">中文</button>
        </div>
      </div>
      <button class="primary" id="addTop" data-i18n="addRiven">新增裂罅</button>
    </header>

    <section class="metrics-bar" aria-label="狙击状态">
      <button class="metric metric-button" id="activeRivensCard" type="button"><span data-i18n="activeRivens">启用裂罅</span><strong id="activeMetric">0</strong></button>
      <button class="metric metric-button" id="onlineHitsCard" type="button"><span data-i18n="onlineHits">在线命中</span><strong id="hitMetric">0</strong></button>
      <button class="metric metric-button" id="weaponsCard" type="button"><span data-i18n="weaponsTracked">武器数</span><strong id="weaponMetric">0</strong></button>
    </section>

    <section class="notice-bar" id="noticeBar" aria-label="系统通知">
      <button class="notice-summary" id="noticeCenterButton" type="button">
        <span class="notice-dot" aria-hidden="true"></span>
        <span class="notice-copy">
          <strong id="noticeTitle" data-i18n="systemNotices">系统通知</strong>
          <span id="noticeSummary" data-i18n="noticeIdle">等待新的在线订单、低价命中或限流等待。</span>
        </span>
        <span class="notice-count" id="noticeCount">0</span>
      </button>
      <div class="notice-actions">
        <button class="ghost notice-permission" id="requestBrowserNotices" type="button" data-i18n="enableBrowserNotices">启用浏览器通知</button>
        <button class="ghost notice-permission" id="toggleNoticeSound" type="button" aria-pressed="false" data-i18n="soundOff">提示音关</button>
      </div>
    </section>

    <div class="layout">
      <aside class="sidebar">
        <div class="section-head">
          <span data-i18n="rivens">裂罅</span>
          <span class="count" id="rivenCount">0</span>
        </div>
        <div class="riven-list" id="rivenList"></div>
        <div class="side-actions">
          <button class="primary" id="addSide" data-i18n="add">新增</button>
          <button class="ghost" id="editSide" data-i18n="modify">修改</button>
          <button class="danger" id="deleteSide" data-i18n="delete">删除</button>
        </div>
      </aside>

      <main class="main">
        <section class="card inbox" aria-label="网页命中">
          <div class="section-head">
            <span data-i18n="webHits">网页命中</span>
            <div class="section-tools">
              <span class="count" id="sourceStatus">0 条订单</span>
              <label class="refresh-control" for="refreshSeconds">
                <span data-i18n="refreshLabel">刷新</span>
                <input id="refreshSeconds" type="number" min="10" step="10" inputmode="numeric" value="120" aria-describedby="refreshRisk">
                <span>s</span>
              </label>
              <span class="refresh-risk" id="refreshRisk" data-i18n="refreshRisk" hidden>高风险</span>
            </div>
          </div>
          <div class="table">
            <div class="row head">
              <div class="cell" data-i18n="listing">订单</div>
              <div class="cell">
                <button class="sort-header" id="priceSort" type="button" aria-pressed="true" data-sort-control="price">
                  <span data-i18n="price">价格</span>
                  <span class="sort-glyph" aria-hidden="true">↑</span>
                </button>
              </div>
              <div class="cell" data-i18n="seller">卖家</div>
              <div class="cell">
                <button class="sort-header" id="timeSort" type="button" aria-pressed="false" data-sort-control="time">
                  <span data-i18n="time">时间</span>
                  <span class="sort-glyph" aria-hidden="true">↕</span>
                </button>
              </div>
              <div class="cell" data-i18n="copy">消息</div>
            </div>
            <div id="hits"></div>
          </div>
        </section>
      </main>
    </div>
    <footer class="app-footer">Warframe Riven Sniper v1.2 · MIT License · 2026</footer>
  </div>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="false"></div>

  <div class="modal" id="addModal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle" data-i18n="createRiven">创建裂罅</h2>
          <p class="sub" id="modalHint" data-i18n="createHint">选择武器和词条；裂罅名称会根据正面词条自动生成。</p>
        </div>
        <button class="ghost" id="closeModal" data-i18n="close">关闭</button>
      </div>
      <div class="modal-body">
        <div class="modal-grid">
          <div class="field span-6">
            <label for="modalTarget" data-i18n="target">武器名称</label>
            <div class="combo">
              <input id="modalTarget" role="combobox" aria-autocomplete="list" aria-expanded="false" aria-controls="weaponMenu" autocomplete="off">
              <div class="combo-menu" id="weaponMenu" role="listbox" hidden></div>
            </div>
          </div>
          <div class="field span-3">
            <label for="modalMinPrice" data-i18n="minPrice">最低价</label>
            <div class="price-entry">
              <input id="modalMinPrice" inputmode="numeric" pattern="[0-9]*" autocomplete="off" aria-describedby="modalMinPriceSuffix">
              <span id="modalMinPriceSuffix" aria-hidden="true">p</span>
            </div>
          </div>
          <div class="field span-3">
            <label for="modalPrice" data-i18n="maxPrice">最高价</label>
            <div class="price-entry">
              <input id="modalPrice" inputmode="numeric" pattern="[0-9]*" autocomplete="off" aria-describedby="modalPriceSuffix">
              <span id="modalPriceSuffix" aria-hidden="true">p</span>
            </div>
          </div>

          <div class="field span-12">
            <label data-i18n="positiveAttrs" id="positiveLabel">正面词条</label>
            <div class="stat-grid">
              <select id="modalPositive1"></select>
              <select id="modalPositive2"></select>
              <select id="modalPositive3"></select>
            </div>
          </div>

          <div class="field span-12">
            <label data-i18n="negativeAttr" id="negativeLabel">负面词条</label>
            <select id="modalNegative"></select>
          </div>
          <div class="field span-12">
            <div class="modal-analysis" id="modalAnalysis" aria-live="polite"></div>
          </div>
          <div class="field detail-section">
            <div class="market-details">
              <div class="field">
                <label for="modalPolarity" data-i18n="polarity">极性</label>
                <select id="modalPolarity">
                  <option value="Any">Any</option>
                  <option value="Madurai">V Madurai</option>
                  <option value="Vazarin">D Vazarin</option>
                  <option value="Naramon">Dash Naramon</option>
                  <option value="Zenurik">Bar Zenurik</option>
                </select>
              </div>
              <div class="field">
                <label for="modalMastery" data-i18n="mastery">段位</label>
                <input id="modalMastery" value="14" inputmode="numeric">
              </div>
              <div class="field">
                <label for="modalRank" data-i18n="rank">等级</label>
                <select id="modalRank">
                  <option>Rank 8</option>
                  <option>Rank 7</option>
                  <option>Rank 6</option>
                  <option>Rank 0</option>
                </select>
              </div>
              <div class="field">
                <label for="modalRerolls" data-i18n="rerolls">循环</label>
                <input id="modalRerolls" value="0" inputmode="numeric">
              </div>
            </div>
          </div>
          <div class="field span-12 name-preview-field">
            <label for="modalName" data-i18n="rivenName">裂罅名称</label>
            <div class="generated-name" id="modalName" aria-live="polite"></div>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="ghost" id="cancelModal" data-i18n="cancel">取消</button>
        <button class="primary" id="createModal" data-i18n="create">创建</button>
      </div>
    </section>
  </div>

  <div class="modal" id="deleteConfirmModal" hidden>
    <section class="modal-panel confirm-panel" role="dialog" aria-modal="true" aria-labelledby="deleteConfirmTitle">
      <div class="modal-head">
        <div>
          <h2 id="deleteConfirmTitle" data-i18n="deleteConfirmTitle">确认删除裂罅</h2>
          <p class="sub" data-i18n="deleteConfirmHint">这个操作会从本地监控列表移除。</p>
        </div>
      </div>
      <div class="confirm-body">
        <p data-i18n="deleteConfirmBody">确定要删除这条裂罅吗？</p>
        <div class="confirm-target" id="deleteConfirmTarget" aria-live="polite"></div>
      </div>
      <div class="modal-actions">
        <button class="ghost" id="cancelDeleteConfirm" data-i18n="noKeep">否，保留</button>
        <button class="danger" id="confirmDeleteRiven" data-i18n="yesDelete">是，删除</button>
      </div>
    </section>
  </div>

  <div class="modal" id="hitsModal" hidden>
    <section class="modal-panel wide-panel" role="dialog" aria-modal="true" aria-labelledby="hitsModalTitle">
      <div class="modal-head">
        <div>
          <h2 id="hitsModalTitle" data-i18n="allOnlineHits">全部在线命中</h2>
          <p class="sub" id="hitsModalCount">0 条订单</p>
        </div>
        <div class="modal-tools">
          <button class="ghost" id="closeHitsModal" data-i18n="close">关闭</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="hit-stack table-like" id="allHitsList"></div>
      </div>
    </section>
  </div>

  <div class="modal" id="weaponsModal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="weaponsModalTitle">
      <div class="modal-head">
        <div>
          <h2 id="weaponsModalTitle" data-i18n="trackedWeapons">已追踪武器</h2>
          <p class="sub" id="weaponsModalCount">0 件武器</p>
        </div>
        <button class="ghost" id="closeWeaponsModal" data-i18n="close">关闭</button>
      </div>
      <div class="modal-body">
        <div class="hit-stack" id="weaponRoutes"></div>
      </div>
    </section>
  </div>

  <div class="modal" id="noticeModal" hidden>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="noticeModalTitle">
      <div class="modal-head">
        <div>
          <h2 id="noticeModalTitle" data-i18n="systemNotices">系统通知</h2>
          <p class="sub" id="noticeModalCount">0</p>
        </div>
        <div class="modal-tools">
          <button class="ghost" id="clearNotices" data-i18n="clearNotices">清空</button>
          <button class="ghost" id="closeNoticeModal" data-i18n="close">关闭</button>
        </div>
      </div>
      <div class="modal-body">
        <div class="notice-list" id="noticeList"></div>
      </div>
    </section>
  </div>

  <script type="module">

    function storedLanguage() {
      try {
        const value = window.localStorage?.getItem(languageStorageKey);
        return value === "en" || value === "zh" ? value : "zh";
      } catch {
        return "zh";
      }
    }

    function storeLanguage(value) {
      try {
        window.localStorage?.setItem(languageStorageKey, value);
      } catch {
        // Ignore unavailable storage; language still works for the current session.
      }
    }

    function normalizeRefreshSeconds(value) {
      const numeric = Number(String(value || "").replace(/[^\d]/g, ""));
      if (!Number.isFinite(numeric) || numeric <= 0) return defaultRefreshSeconds;
      return Math.max(minimumRefreshSeconds, Math.floor(numeric));
    }

    function storedRefreshSeconds() {
      try {
        return normalizeRefreshSeconds(window.localStorage?.getItem(refreshIntervalStorageKey) || defaultRefreshSeconds);
      } catch {
        return defaultRefreshSeconds;
      }
    }

    function storeRefreshSeconds(value) {
      try {
        window.localStorage?.setItem(refreshIntervalStorageKey, String(normalizeRefreshSeconds(value)));
      } catch {
        // Ignore unavailable storage; refresh timing still works for the current session.
      }
    }

    function readJsonStorage(key, fallback) {
      try {
        const raw = window.localStorage?.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function writeJsonStorage(key, value) {
      try {
        window.localStorage?.setItem(key, JSON.stringify(value));
      } catch {
        // Ignore unavailable storage; notifications still work for the current session.
      }
    }

    function removeStorageItem(key) {
      try {
        window.localStorage?.removeItem(key);
      } catch {
        // Ignore unavailable storage; the current session state still works.
      }
    }

    function readBooleanStorage(key, fallback = false) {
      try {
        const value = window.localStorage?.getItem(key);
        if (value === "true") return true;
        if (value === "false") return false;
        return fallback;
      } catch {
        return fallback;
      }
    }

    function booleanStorageHasValue(key) {
      try {
        const value = window.localStorage?.getItem(key);
        return value === "true" || value === "false";
      } catch {
        return false;
      }
    }

    function writeBooleanStorage(key, value) {
      try {
        window.localStorage?.setItem(key, value ? "true" : "false");
      } catch {
        // Ignore unavailable storage; the current session state still works.
      }
    }

    function displayHitTitle(hit) {
      const title = hit.title || hit.rivenName || "";
      const weapon = rivenWeaponFamily(hit.weapon || title.split(" ")[0] || "");
      const displayWeapon = displayWeaponName(weapon);
      if (!title || !weapon || displayWeapon === weapon) return title;
      const escapedWeapon = weapon.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return title.replace(new RegExp(`^${escapedWeapon}\\b`, "i"), displayWeapon);
    }

    function applyRivenWeaponMeta(riven) {
      const weapon = riven?.weapon;
      if (!weapon?.family) return;
      weaponMeta[weapon.family] = {
        zh: weapon.labels?.zh || weapon.label || weapon.family,
        group: weapon.group || weaponMeta[weapon.family]?.group || null,
        disposition: Number(weapon.disposition) || weaponMeta[weapon.family]?.disposition || 0
      };
    }

    function formatTime(value) {
      const time = Date.parse(value);
      if (!Number.isFinite(time)) return value || "";
      const seconds = Math.max(0, Math.floor((Date.now() - time) / 1000));
      if (seconds < 60) return `${seconds}s`;
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m`;
      const hours = Math.floor(minutes / 60);
      if (hours < 48) return `${hours}h`;
      return `${Math.floor(hours / 24)}d`;
    }

    function noticeSeverityClass(event) {
      if (!event) return "";
      return event.severity || "success";
    }

    function displayNoticeListingName(event) {
      const listing = event?.listingName || event?.rivenName || "";
      if (!listing) return "";
      const weapon = rivenWeaponFamily(event.weapon || listing.split(" ")[0] || "");
      const displayWeapon = displayWeaponName(weapon);
      if (!weapon || displayWeapon === weapon) return listing;
      const escapedWeapon = weapon.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return listing.replace(new RegExp(`^${escapedWeapon}\\b`, "i"), displayWeapon);
    }

    function localizedNotice(event) {
      if (!event) return { title: "", body: "" };
      return formatNotificationEvent({
        ...event,
        listingName: displayNoticeListingName(event) || event.listingName
      }, lang);
    }

    function persistNotificationState() {
      notificationState = pruneNotificationState(notificationState);
      if (notificationState.events.length || notificationState.seenHitKeys.length || notificationState.dismissedHitKeys?.length || notificationState.dismissedEventIds?.length || notificationState.dismissedMessageKeys?.length || notificationState.rateLimitKey || notificationState.matchSignature) {
        writeJsonStorage(notificationStorageKey, notificationState);
      } else {
        removeStorageItem(notificationStorageKey);
      }
    }

    function resetNotificationsForRivenChange({ notifyCurrentHits = false } = {}) {
      notificationState = resetNotificationMatchState(notificationState, "", { initialized: notifyCurrentHits });
      persistNotificationState();
      renderNotificationUI();
    }

    function browserNoticeSupported() {
      return "Notification" in window;
    }

    function browserNoticePermissionLabel() {
      if (!browserNoticeSupported()) return t("browserNoticesUnsupported");
      if (Notification.permission === "denied") return t("browserNoticesBlocked");
      if (browserNotificationsEnabled && Notification.permission === "granted") return t("browserNoticesOn");
      if (browserNotificationsEnabled && Notification.permission === "default") return t("browserNoticesPending");
      return t("enableBrowserNotices");
    }

    function noticeSoundSupported() {
      return Boolean(window.AudioContext || window.webkitAudioContext);
    }

    function noticeSoundLabel() {
      if (!noticeSoundSupported()) return t("soundUnsupported");
      return notificationSoundEnabled ? t("soundOn") : t("soundOff");
    }

    function soundPatternForEvent(event) {
      if (event?.severity === "price") {
        return [
          { frequency: 880, start: 0, duration: 0.06, gain: 0.045 },
          { frequency: 1175, start: 0.08, duration: 0.08, gain: 0.038 }
        ];
      }
      if (event?.severity === "wait") {
        return [
          { frequency: 440, start: 0, duration: 0.055, gain: 0.032 },
          { frequency: 330, start: 0.07, duration: 0.06, gain: 0.026 }
        ];
      }
      return [{ frequency: 740, start: 0, duration: 0.07, gain: 0.035 }];
    }

    function primarySoundEvent(events) {
      return events.find(event => event.severity === "price")
        || events.find(event => event.severity === "success")
        || events[0]
        || null;
    }

    async function playNoticeSound(event) {
      if (!event || !notificationSoundEnabled || !noticeSoundSupported()) return;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      noticeAudioContext ||= new AudioContextClass();
      if (noticeAudioContext.state === "suspended") await noticeAudioContext.resume();
      const startAt = noticeAudioContext.currentTime + 0.02;
      soundPatternForEvent(event).forEach(tone => {
        const oscillator = noticeAudioContext.createOscillator();
        const gain = noticeAudioContext.createGain();
        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(tone.frequency, startAt + tone.start);
        gain.gain.setValueAtTime(0.0001, startAt + tone.start);
        gain.gain.exponentialRampToValueAtTime(tone.gain, startAt + tone.start + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, startAt + tone.start + tone.duration);
        oscillator.connect(gain);
        gain.connect(noticeAudioContext.destination);
        oscillator.start(startAt + tone.start);
        oscillator.stop(startAt + tone.start + tone.duration + 0.02);
      });
    }

    function sendBrowserNotice(event) {
      if (!browserNoticeSupported() || !browserNotificationsEnabled || Notification.permission !== "granted") return;
      const notice = localizedNotice(event);
      try {
        new Notification(notice.title, {
          body: notice.body,
          tag: event.id,
          icon: "/assets/logo.svg"
        });
      } catch {
        // Browser notifications are best-effort; in-page notices remain the source of truth.
      }
    }

    function showToastEvents(events) {
      const node = document.querySelector("#toastStack");
      if (!node || !events.length) return;
      const visible = events.slice(-3).reverse();
      node.innerHTML = visible.map(event => {
        const notice = localizedNotice(event);
        return `
        <div class="toast ${escapeHtml(noticeSeverityClass(event))}">
          <span class="notice-dot" aria-hidden="true"></span>
          <span>
            <strong>${escapeHtml(notice.title)}</strong>
            <span>${escapeHtml(notice.body)}</span>
          </span>
        </div>
      `;
      }).join("");
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        node.innerHTML = "";
      }, 7000);
    }

    function addNotificationEvents(events) {
      const existingIds = new Set(notificationState.events.map(event => event.id));
      const dismissedIds = new Set(notificationState.dismissedEventIds || []);
      const dismissedHitKeys = new Set(notificationState.dismissedHitKeys || []);
      const dismissedMessageKeys = new Set(notificationState.dismissedMessageKeys || []);
      const uniqueEvents = events.filter(event => event?.id
        && !existingIds.has(event.id)
        && !dismissedIds.has(event.id)
        && !dismissedMessageKeys.has(notificationMessageKey(event))
        && (!event.hitKey || !dismissedHitKeys.has(event.hitKey)));
      if (!uniqueEvents.length) {
        persistNotificationState();
        renderNotificationUI();
        return;
      }
      const singleTypes = new Set(uniqueEvents
        .filter(event => event.type === "rate_limited" || event.type === "browser_notice_enabled")
        .map(event => event.type));
      notificationState.events = [
        ...notificationState.events.filter(event => !singleTypes.has(event.type)),
        ...uniqueEvents
      ];
      persistNotificationState();
      showToastEvents(uniqueEvents);
      uniqueEvents.forEach(sendBrowserNotice);
      playNoticeSound(primarySoundEvent(uniqueEvents)).catch(() => {});
      renderNotificationUI();
    }

    function browserNoticeEnabledEvent() {
      return {
        id: `browser_notice_enabled:${Date.now()}`,
        type: "browser_notice_enabled",
        severity: "success",
        title: t("browserNoticeEnabledTitle"),
        body: t("browserNoticeEnabledBody"),
        createdAt: new Date().toISOString()
      };
    }

    function processNotifications() {
      notificationState = syncNotificationMatchState(notificationState, createNotificationMatchSignature(rivens));
      const hitResult = collectHitNotifications({
        hits: listings,
        rivens,
        seenHitKeys: notificationState.seenHitKeys,
        dismissedHitKeys: notificationState.dismissedHitKeys,
        dismissedEventIds: notificationState.dismissedEventIds,
        dismissedMessageKeys: notificationState.dismissedMessageKeys,
        initialized: notificationState.initialized,
        lang
      });
      notificationState.seenHitKeys = hitResult.seenHitKeys;
      notificationState.initialized = hitResult.initialized;

      const rateResult = createRateLimitNotification({
        meta: marketMeta,
        previousKey: notificationState.rateLimitKey,
        lang
      });
      notificationState.rateLimitKey = rateResult.key;

      addNotificationEvents([...hitResult.events, rateResult.event].filter(Boolean));
    }

    function renderNotificationUI() {
      const summary = document.querySelector("#noticeCenterButton");
      const title = document.querySelector("#noticeTitle");
      const body = document.querySelector("#noticeSummary");
      const count = document.querySelector("#noticeCount");
      const permission = document.querySelector("#requestBrowserNotices");
      if (!summary || !title || !body || !count || !permission) return;

      const latest = notificationState.events.at(-1);
      const latestNotice = localizedNotice(latest);
      summary.classList.remove("has-success", "has-price", "has-wait");
      if (latest) summary.classList.add(`has-${noticeSeverityClass(latest)}`);
      title.textContent = latest ? latestNotice.title : t("systemNotices");
      body.textContent = latest ? latestNotice.body : t("noticeIdle");
      count.textContent = String(notificationState.events.length);
      permission.textContent = browserNoticePermissionLabel();
      permission.disabled = browserNoticeSupported() && Notification.permission === "denied";
      const soundButton = document.querySelector("#toggleNoticeSound");
      if (soundButton) {
        soundButton.textContent = noticeSoundLabel();
        soundButton.disabled = !noticeSoundSupported();
        soundButton.setAttribute("aria-pressed", String(notificationSoundEnabled && noticeSoundSupported()));
      }
      if (!document.querySelector("#noticeModal").hidden) renderNoticeModal();
    }

    function renderNoticeModal() {
      const rows = [...notificationState.events].reverse();
      document.querySelector("#noticeModalCount").textContent = `${rows.length} ${t("noticeCount")}`;
      document.querySelector("#noticeList").innerHTML = rows.length ? rows.map(event => {
        const notice = localizedNotice(event);
        const canLocate = Boolean(event.rivenId);
        return `
        <div class="notice-item ${escapeHtml(noticeSeverityClass(event))}" data-notice-id="${escapeHtml(event.id || "")}" data-can-locate="${canLocate ? "true" : "false"}">
          <span class="notice-dot" aria-hidden="true"></span>
          <span class="notice-item-main">
            <strong>${escapeHtml(notice.title)}</strong>
            <span>${escapeHtml(notice.body)}</span>
          </span>
          <span class="notice-item-actions">
            <small>${escapeHtml(formatTime(event.createdAt))}</small>
            <button class="ghost notice-delete" type="button" data-notice-action="delete" data-notice-id="${escapeHtml(event.id || "")}" aria-label="${escapeHtml(t("noticeDismiss"))}">×</button>
          </span>
        </div>
      `;
      }).join("") : `<div class="empty">${t("noticeEmpty")}</div>`;
    }

    function openNoticeModal() {
      renderNoticeModal();
      document.querySelector("#noticeModal").hidden = false;
    }

    function closeNoticeModal() {
      document.querySelector("#noticeModal").hidden = true;
    }

    function clearNotices() {
      notificationState = clearNotificationEvents(notificationState);
      persistNotificationState();
      renderNotificationUI();
      renderNoticeModal();
    }

    function deleteNotice(id) {
      notificationState = dismissNotificationEvent(notificationState, id);
      persistNotificationState();
      renderNotificationUI();
      renderNoticeModal();
    }

    function scrollWindowToElement(node, offset = 150) {
      if (!node) return;
      const top = node.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top: Math.max(0, top), behavior: "smooth" });
    }

    function locateNotice(id) {
      const event = notificationState.events.find(item => item.id === id);
      if (!event?.rivenId) return;
      const riven = rivens.find(item => item.id === event.rivenId);
      if (!riven) {
        alert(t("noticeGone"));
        return;
      }
      selectedId = riven.id;
      document.querySelector("#search").value = "";
      closeNoticeModal();
      closeHitsModal();
      render();
      const rows = [...document.querySelectorAll("[data-hit-key]")];
      const row = rows.find(node => node.dataset.hitKey === event.hitKey);
      const rivenButton = [...document.querySelectorAll(".riven-item")].find(node => node.dataset.id === event.rivenId);
      const target = row || rivenButton || document.querySelector("#hits");
      scrollWindowToElement(target);
      if (row) {
        row.classList.add("hit-focus");
        setTimeout(() => row.classList.remove("hit-focus"), 1800);
      }
    }

    async function requestBrowserNotices() {
      if (!browserNoticeSupported()) {
        browserNotificationsEnabled = false;
        writeBooleanStorage(browserNotificationStorageKey, false);
        renderNotificationUI();
        return;
      }
      const permission = await Notification.requestPermission();
      browserNotificationsEnabled = permission === "granted";
      writeBooleanStorage(browserNotificationStorageKey, browserNotificationsEnabled);
      if (browserNotificationsEnabled && !booleanStorageHasValue(soundNotificationStorageKey)) {
        notificationSoundEnabled = true;
        writeBooleanStorage(soundNotificationStorageKey, true);
      }
      if (browserNotificationsEnabled) addNotificationEvents([browserNoticeEnabledEvent()]);
      renderNotificationUI();
    }

    function toggleNoticeSound() {
      notificationSoundEnabled = !notificationSoundEnabled;
      writeBooleanStorage(soundNotificationStorageKey, notificationSoundEnabled);
      if (notificationSoundEnabled) playNoticeSound({ severity: "success" }).catch(() => {});
      renderNotificationUI();
    }

    function requestBrowserNoticesOnFirstGesture() {
      if (!browserNotificationsEnabled || !browserNoticeSupported() || Notification.permission !== "default") return;
      let requested = false;
      const requestOnce = () => {
        if (requested || !browserNotificationsEnabled || Notification.permission !== "default") return;
        requested = true;
        requestBrowserNotices().catch(() => renderNotificationUI());
      };
      window.addEventListener("pointerdown", requestOnce, { once: true, capture: true });
      window.addEventListener("keydown", requestOnce, { once: true, capture: true });
    }

    function renderStatChips(hit) {
      const attributes = hit.attributes || [];
      if (!attributes.length) return `<small>${escapeHtml(lang === "zh" ? hit.statsZh : hit.statsEn)}</small>`;
      const renderChip = attribute => {
        const value = Number(attribute.value);
        const sign = attribute.positive ? "+" : "-";
        const amount = Number.isFinite(value) ? `${sign}${Math.abs(value).toFixed(1)}%` : sign;
        return `<span class="stat-chip ${attribute.positive ? "positive" : "negative"}" title="${escapeHtml(`${amount} ${statLabel(attribute.key)}`)}">${escapeHtml(amount)} ${escapeHtml(statLabel(attribute.key))}</span>`;
      };
      return `
        <div class="stat-chips">
          ${attributes.map(renderChip).join("")}
        </div>
      `;
    }

    function listingAttributeGrades(hit) {
      const attributes = hit.attributes || [];
      if (!attributes.length) return [];
      const weapon = rivenWeaponFamily(hit.weapon || hit.title?.split(" ")[0] || "");
      const group = weaponGroup(weapon) || "rifle";
      const cacheKey = `${lang}::${listingAnalysisCacheKey({ weapon, group, attributes })}`;
      let grades = hitAnalysisCache.get(cacheKey);
      if (!grades) {
        grades = analyzeListingAttributes({ weapon, group, attributes, statCatalog, lang });
        hitAnalysisCache.set(cacheKey, grades);
      }
      return grades;
    }

    function renderListingGradeBadges(hit) {
      const grades = listingAttributeGrades(hit);
      if (!grades.length) return "";
      return `
        <span class="listing-grade-stack" aria-label="${escapeHtml(t("statPriority"))}">
          ${grades.map(grade => `<span class="listing-grade tier-${grade.tier.toLowerCase()}" title="${escapeHtml(`${grade.sign}${grade.label} ${statTierMark(grade)}`)}">${escapeHtml(statTierMark(grade))}</span>`).join("")}
        </span>
      `;
    }

    function rivenStatShape(hit) {
      const attributes = hit.attributes || [];
      if (!attributes.length) return "";
      const positives = attributes.filter(attribute => attribute.positive).length;
      const negatives = attributes.filter(attribute => !attribute.positive).length;
      if (!positives && !negatives) return "";
      return negatives ? `${positives}+${negatives}` : String(positives);
    }

    function copyStatDetails(hit) {
      const attributes = hit.attributes || [];
      if (!attributes.length) return hit.statsEn || "";
      return attributes.map(attribute => {
        const value = Number(attribute.value);
        const sign = attribute.positive ? "+" : "-";
        const amount = Number.isFinite(value) ? `${sign}${Math.abs(value).toFixed(1)}%` : sign;
        return `${statLabelForCopy(attribute.key)} ${amount}`;
      }).join(", ");
    }

    function copyListingDetails(hit) {
      return [rivenStatShape(hit), copyStatDetails(hit)].filter(Boolean).join("; ");
    }

    function replyText(hit) {
      const plat = String(hit.price || "").replace(/[^\d.]/g, "") || String(hit.price || "");
      const details = copyListingDetails(hit);
      const detailText = details ? ` (${details})` : "";
      return `/w ${hit.sellerName} Hi, i am interested in your "${hit.rivenName || hit.title}"${detailText}, is that still available for ${plat} plat?`;
    }

    async function copyReply(button) {
      const text = button.dataset.reply || "";
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
      } else {
        const temp = document.createElement("textarea");
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        temp.remove();
      }
      button.textContent = t("copied");
      setTimeout(() => { button.textContent = t("copyAction"); }, 1200);
    }

    function attachCopyButtons(root = document) {
      root.querySelectorAll(".copy-button").forEach(button => {
        button.addEventListener("click", () => copyReply(button).catch(() => {}));
      });
    }

    function renderHitRow(hit, riven, rowClass = "row") {
      return `
        <div class="${rowClass}" data-hit-key="${escapeHtml(hitNotificationKey(hit))}">
          <div class="cell">
            <div class="listing-title">
              <strong title="${escapeHtml(hit.title || hit.rivenName || "")}">${escapeHtml(displayHitTitle(hit))}</strong>
              ${renderListingGradeBadges(hit)}
            </div>
            ${renderStatChips(hit)}
          </div>
          <div class="cell price-cell">${escapeHtml(hit.price)}</div>
          <div class="cell seller-cell"><span class="seller-name" title="${escapeHtml(hit.sellerName)}">${escapeHtml(hit.sellerName)}</span><span class="status-pill ${hit.status}">${hit.status === "online" ? (lang === "zh" ? "在线" : "online") : (lang === "zh" ? "离线" : "offline")}</span></div>
          <div class="cell time-cell"><span class="relative-time" data-time="${escapeHtml(hit.time)}">${escapeHtml(formatTime(hit.time))}</span></div>
          <div class="cell"><button class="copy-button" type="button" data-reply="${escapeHtml(replyText(hit))}">${t("copyAction")}</button></div>
        </div>
      `;
    }

    function generatedNameCore(positives) {
      const selected = positives.filter(Boolean).map(value => rivenNameParts[value] || ["Visi", "Ata"]);
      if (!selected.length) return "Riven";
      if (selected.length === 1) return selected[0][0];
      if (selected.length === 2) return `${selected[0][0]}${selected[1][1].toLowerCase()}`;
      return `${selected[0][0]}-${selected[1][0].toLowerCase()}${selected[2][1].toLowerCase()}`;
    }

    let knownWeaponNames = new Set(catalogWeaponFamilies);

    function canonicalWeaponFromInput(value) {
      const trimmed = value.trim();
      const match = Object.entries(weaponMeta).find(([family, meta]) => trimmed === family || trimmed === meta.zh);
      return match ? match[0] : trimmed;
    }

    function rivenWeaponFamily(target) {
      const name = canonicalWeaponFromInput(target);
      const suffixVariants = [" Prime", " Vandal", " Wraith"];
      const prefixVariants = ["MK1-", "Prisma ", "Mara ", "Dex ", "Vaykor ", "Telos ", "Synoid ", "Rakta ", "Sancti ", "Secura "];
      for (const suffix of suffixVariants) {
        if (name.endsWith(suffix)) {
          const candidate = name.slice(0, -suffix.length);
          if (knownWeaponNames.has(candidate)) return candidate;
        }
      }
      for (const prefix of prefixVariants) {
        if (name.startsWith(prefix)) {
          const candidate = name.slice(prefix.length);
          if (knownWeaponNames.has(candidate)) return candidate;
        }
      }
      return name;
    }

    function validRivenWeaponFamily(target, fallback = "Rubico") {
      const family = rivenWeaponFamily(target || fallback);
      return knownWeaponNames.has(family) ? family : fallback;
    }

    function weaponGroup(family) {
      const meta = weaponMeta[rivenWeaponFamily(family)];
      if (!meta) return null;
      return meta.group === "archmelee" ? "melee" : meta.group;
    }

    function weaponGroupLabel(family) {
      const labels = {
        rifle: { en: "Rifle / primary pool", zh: "步枪 / 主武器词条池" },
        shotgun: { en: "Shotgun pool", zh: "霰弹枪词条池" },
        pistol: { en: "Pistol / secondary pool", zh: "手枪 / 副武器词条池" },
        melee: { en: "Melee pool", zh: "近战词条池" },
        archgun: { en: "Archgun pool", zh: "Archwing 枪械词条池" },
        robotic: { en: "Robotic weapon pool", zh: "同伴武器词条池" },
        all: { en: "All Riven stats", zh: "全部裂罅词条" }
      };
      return (labels[weaponGroup(family)] || labels.all)[lang];
    }

    function displayWeaponName(family) {
      return displayWeaponNameForLang(family, lang);
    }

    function hasLocalizedWeaponName(family) {
      const clean = rivenWeaponFamily(family);
      return Boolean(weaponMeta[clean]?.zh);
    }

    function defaultModalWeaponFamily() {
      return weaponOptions.includes("Rubico") ? "Rubico" : weaponOptions[0] || "Rubico";
    }

    function generatedRivenName(riven) {
      return `${rivenWeaponFamily(riven.target)} ${generatedNameCore(riven.positives)}`;
    }

    function listingSearchText(hit, riven) {
      return [
        rivenWeaponFamily(riven.target),
        displayWeaponName(riven.target),
        generatedRivenName(riven),
        generatedNameCore(riven.positives),
        statSummary(riven),
        hit.title,
        displayHitTitle(hit),
        displayWeaponName(hit.weapon || riven.target),
        hit.statsEn,
        hit.statsZh,
        hit.price,
        hit.sellerName,
        hit.status,
        hit.status === "online" ? "在线" : "离线",
        hit.time
      ].join(" ").toLowerCase();
    }

    function queryMatchesListing(hit, riven, query) {
      if (!query) return true;
      return queryMatchesTextAndPrice(query, listingSearchText(hit, riven), hit.price);
    }

    function hitWithinRivenPriceRange(hit, riven) {
      const actual = priceNumber(hit.price);
      if (normalizePlatPrice(riven.minPrice) && (!Number.isFinite(actual) || actual <= priceNumber(riven.minPrice))) return false;
      if (normalizePlatPrice(riven.price) && (!Number.isFinite(actual) || actual >= priceNumber(riven.price))) return false;
      return true;
    }

    function hitVisibleForRiven(hit, riven) {
      return (!onlineOnly || hit.status === "online") && hitWithinRivenPriceRange(hit, riven);
    }

    function queryMatchesRiven(riven, query) {
      if (!query) return true;
      const parsed = parseSearchQuery(query);
      const rivenText = [
        rivenWeaponFamily(riven.target),
        displayWeaponName(riven.target),
        riven.target,
        generatedRivenName(riven),
        generatedNameCore(riven.positives),
        statSummary(riven),
        displayPriceRange(riven),
        riven.minPrice,
        riven.price
      ].join(" ").toLowerCase();
      if (parsed.terms.every(term => rivenText.includes(term)) && priceRangeMatchesFilters(parsed.priceFilters, riven)) return true;
      if (parsed.terms.every(term => rivenText.includes(term)) && !queryHasPriceFilter(parsed)) return true;
      return listings
        .filter(hit => hit.rivenId === riven.id && hitVisibleForRiven(hit, riven))
        .some(hit => queryMatchesListing(hit, riven, parsed));
    }

    function updateSearchHelp(hitCount, query) {
      const node = document.querySelector("#searchHelp");
      if (!query) {
        node.textContent = t("searchHelp");
        return;
      }
      node.textContent = lang === "zh" ? `当前搜索匹配 ${hitCount} 条订单` : `${hitCount} matching listings`;
    }

    function polarityLabel(value) {
      const labels = {
        Any: { en: "Any", zh: "任意" },
        Madurai: { en: "V Madurai", zh: "V Madurai" },
        Vazarin: { en: "D Vazarin", zh: "D Vazarin" },
        Naramon: { en: "— Naramon", zh: "— Naramon" },
        Zenurik: { en: "= Zenurik", zh: "= Zenurik" }

      return (labels[value] || labels.Any)[lang];

    let modalWeaponFamily = "";
    let editingRivenId = null;

    function currentModalWeaponFamily() {
      const typed = document.querySelector("#modalTarget")?.value.trim() || "";

    function applyModalModeLabels() {

      document.querySelector("#modalHint").textContent = editing ? t("editHint") : t("createHint");

    function statOptionsForWeapon(family, select) {
      const group = weaponGroup(family);
      const isNegative = select.id.toLowerCase().includes("negative");
      return statCatalog.filter(stat => stat.key === "" || ((!group || stat.groups.includes(group)) && (!isNegative || !stat.positiveOnly)));

    function fillStatSelect(select, value) {

        return `<option value="${stat.key}">${label}</option>`;
      }).join("");
      select.value = options.some(stat => stat.key === value) ? (value || "") : "";
    }

    function fillAllStatSelects() {
      ["modalPositive1", "modalPositive2", "modalPositive3", "modalNegative"].forEach(id => {
        const select = document.querySelector(`#${id}`);
        if (select) fillStatSelect(select, select.value || "");
      });

    let weaponMenuIndex = 0;

    function matchingWeapons(filter) {
      const query = filter.trim().toLowerCase();
      const ranked = weaponOptions
        .map(name => ({
          name,
          search: `${name} ${weaponMeta[name]?.zh || ""} ${weaponGroupLabel(name)}`.toLowerCase(),
          display: displayWeaponName(name)
        }))
        .map(item => ({
          ...item,
          score: !query ? 1 : item.search === query ? 4 : item.search.startsWith(query) || item.display.toLowerCase().startsWith(query) ? 3 : item.search.includes(query) ? 2 : 0
        }))
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
      return ranked.slice(0, 10).map(item => item.name);
    }

    function renderWeaponMenu(filter = "", forceOpen = false) {

      weaponMenuIndex = Math.min(weaponMenuIndex, Math.max(0, options.length - 1));
      menu.innerHTML = options.map((name, index) => `
        <button type="button" class="combo-option" role="option" aria-selected="${index === weaponMenuIndex}" data-weapon="${name}">
          <span>${escapeHtml(displayWeaponName(name))}</span>
          <small>${escapeHtml(weaponGroupLabel(name))}</small>
        </button>
      `).join("");
      const shouldOpen = forceOpen && options.length > 0;
      menu.hidden = !shouldOpen;
      input.setAttribute("aria-expanded", String(shouldOpen));

    function populateTargets(names = catalogWeaponFamilies) {
      weaponOptions = [...new Set(names.map(name => rivenWeaponFamily(name)))]
        .filter(name => weaponMeta[name])
        .sort((a, b) => a.localeCompare(b));
      knownWeaponNames = new Set(weaponOptions);
      renderWeaponMenu();

    async function fetchBackendWeaponCatalog() {
      const response = await fetch(`/api/weapons?lang=${lang === "zh" ? "zh" : "en"}`);
      if (!response.ok) throw new Error("Weapon catalog unavailable");
      const body = await response.json();
      const families = (body.data || []).map(weapon => {
        weaponMeta[weapon.family] = {
          zh: weapon.labels?.zh || weapon.family,
          group: weapon.group || weaponMeta[weapon.family]?.group || null,
          disposition: Number(weapon.disposition) || weaponMeta[weapon.family]?.disposition || 0
        };
        return weapon.family;
      });
      if (families.length) populateTargets(families);
    }

    async function apiJson(url, options = {}) {
      const response = await fetch(url, {
        headers: { "content-type": "application/json", ...(options.headers || {}) },
        ...options
      });
      if (response.status === 204) return null;
      const body = await response.json();
      if (!response.ok) {
        const error = new Error(body.error?.message || "Request failed");
        error.code = body.error?.code || "REQUEST_FAILED";
        throw error;
      }
      return body;
    }

    async function refreshData({ force = false } = {}) {
      document.querySelector("#sourceStatus").textContent = t("refreshing");
      try {
        const rivenBody = await apiJson(`/api/rivens?lang=${lang === "zh" ? "zh" : "en"}`);
        rivens = rivenBody.data || [];
        rivens.forEach(applyRivenWeaponMeta);
        try {
          const hitBody = await apiJson(`/api/hits?scope=${onlineOnly ? "online" : "all"}${force ? "&force=true" : ""}&refreshMs=${refreshIntervalMs()}`);
          listings = hitBody.data || [];
          marketMeta = {
            ...marketMeta,
            ...(hitBody.meta || {}),
            refreshIntervalMs: Number(hitBody.meta?.refreshIntervalMs || refreshIntervalMs())
          };
        } catch (error) {
          marketMeta = {
            ...marketMeta,
            status: "unavailable",
            nextRefreshInMs: 30000,
            errorMessage: error.message
          };
        }
      } catch (error) {
        marketMeta = {
          ...marketMeta,
          status: "unavailable",
          nextRefreshInMs: 30000,
          errorMessage: error.message
        };
      }
      marketMetaReceivedAt = Date.now();
      if (!rivens.some(riven => riven.id === selectedId)) selectedId = rivens[0]?.id || null;
      processNotifications();
      render();
      scheduleMarketRefresh();
    }

    function renderList() {
      const query = document.querySelector("#search").value.trim().toLowerCase();
      const filtered = rivens.filter(riven => {
        return queryMatchesRiven(riven, query);
      });

      const grouped = filtered.reduce((groups, riven) => {
        const target = riven.target ? rivenWeaponFamily(riven.target) : t("weapon");
        if (!groups.has(target)) groups.set(target, []);
        groups.get(target).push(riven);
        return groups;
      }, new Map());

      document.querySelector("#rivenCount").textContent = query ? `${filtered.length}/${rivens.length}` : `${rivens.length}`;
      if (!rivens.length) {
        document.querySelector("#rivenList").innerHTML = `<div class="empty">${t("noRivens")}</div>`;
        return;
      }
      document.querySelector("#rivenList").innerHTML = [...grouped.entries()].map(([weapon, group]) => `
        <section class="weapon-group" aria-label="${escapeHtml(displayWeaponName(weapon))}">
          <div class="weapon-group-head">
            <strong>${escapeHtml(displayWeaponName(weapon))}</strong>
            <span>${escapeHtml(weaponDispositionLine(weapon))} · ${group.length} ${group.length === 1 ? t("rivenUnit") : t("rivenUnits")}</span>
          </div>
          <div class="weapon-rivens">
            ${group.map(riven => {
              const hits = listings.filter(hit => hit.rivenId === riven.id && hitVisibleForRiven(hit, riven)).length;
              return `
                <button class="riven-item" data-id="${riven.id}" aria-pressed="${riven.id === selectedId}">
                  <strong>${escapeHtml(generatedNameCore(riven.positives))}</strong>
                  <small>${escapeHtml(statSummary(riven) || displayGeneratedRivenName(riven))}</small>
                  <span class="riven-meta"><span>${escapeHtml(displayPriceRange(riven) || "any")}</span><span>${hits} ${lang === "zh" ? "命中" : "hits"}</span></span>
                </button>
              `;
            }).join("")}
          </div>
        </section>
      `).join("");

      document.querySelectorAll(".riven-item").forEach(button => {
        button.addEventListener("click", () => {
          selectedId = button.dataset.id;
          render();
        });
      });
    }

    function updateModalGeneratedName() {
      const typedTarget = document.querySelector("#modalTarget").value.trim();
      const target = typedTarget ? validRivenWeaponFamily(typedTarget, modalWeaponFamily) : modalWeaponFamily;
      const nameNode = document.querySelector("#modalName");
      if (!target) {
        nameNode.textContent = "";
        nameNode.removeAttribute("title");
        return;
      }
      const preview = {
        target,
        positives: [document.querySelector("#modalPositive1").value, document.querySelector("#modalPositive2").value, document.querySelector("#modalPositive3").value]
      };
      const weaponName = displayWeaponName(target);
      const nameCore = generatedNameCore(preview.positives);
      const fullName = `${weaponName} ${nameCore}`;
      nameNode.title = fullName;
      nameNode.innerHTML = `
        <span class="generated-weapon">${escapeHtml(weaponName)}</span>
        <span class="generated-core">${escapeHtml(nameCore)}</span>
      `;
      renderModalAnalysis();

    function renderMetrics() {
      const onlineHits = listings.filter(hit => hit.status === "online").length;
      const weapons = new Set(rivens.map(riven => rivenWeaponFamily(riven.target))).size;
      document.querySelector("#activeMetric").textContent = rivens.length;
      document.querySelector("#hitMetric").textContent = onlineOnly ? onlineHits : listings.length;
      document.querySelector("#weaponMetric").textContent = weapons;
      document.querySelector("#editSide").disabled = !activeRiven();
